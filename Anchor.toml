[toolchain]
package_manager = "pnpm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
pitchmarket = "Bw3Ztg8nPBRxVLLtNqCksQNEP4cbv64xbpzr6YHrX7a7"

[programs.devnet]
pitchmarket = "Bw3Ztg8nPBRxVLLtNqCksQNEP4cbv64xbpzr6YHrX7a7"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

# Load the TxODDS stub at the real TxODDS program address on the local validator, so
# PitchMarket's CPI into validate_stat works in tests. (Built separately; see scripts.)
[[test.genesis]]
address = "6pW64gN1s2uqjHkn1unFeEjAwJkPGHoppGvS715wyP2J"
program = "target/deploy/txodds_stub.so"

[scripts]
test = "pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[hooks]
